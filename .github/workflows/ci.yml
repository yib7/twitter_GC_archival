name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (build core)
        run: npm run test:unit

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # No personal_data/ on a clean checkout, so the app boots on the committed
      # synthetic sample — exactly what these end-to-end tests assert against.
      - name: End-to-end tests
        run: npm run test:e2e
