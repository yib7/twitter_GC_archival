<!DOCTYPE html>
<html lang="en" data-theme="lightsout">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Offline archive viewer for Twitter/X group DM conversations — search, browse, and explore your group chat history with full media support." />
  <meta name="theme-color" content="#000000" />
  <title>Group Chat Archive</title>
  <link rel="stylesheet" href="src/styles.css" />
  <script>
    /* Apply the saved theme before first paint to avoid a flash-of-wrong-theme.
       gca.theme is the single source of truth (default "lightsout"); app.js's
       theme module reconciles the floating switch + Settings and persists here. */
    (function () {
      try {
        var t = localStorage.getItem("gca.theme");
        if (t === "light" || t === "dim" || t === "lightsout") {
          document.documentElement.setAttribute("data-theme", t);
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="boot" class="boot" aria-hidden="true">
    <div class="skeleton-wrap">
      <div class="skeleton-msg"><div class="skeleton-av"></div><div class="skeleton-bubble" style="width:40%"></div></div>
      <div class="skeleton-msg"><div class="skeleton-av"></div><div class="skeleton-bubble" style="width:70%"></div></div>
      <div class="skeleton-msg me"><div class="skeleton-bubble" style="width:50%"></div></div>
      <div class="skeleton-msg"><div class="skeleton-av"></div><div class="skeleton-bubble" style="width:30%"></div></div>
    </div>
  </div>

  <div id="app" class="app" hidden>
    <!-- Sidebar -->
    <aside class="sidebar" aria-label="Sidebar">
      <div class="brand">
        <!-- The real group photo (gc_photo.jpg) is private/gitignored; the
             committed app uses a neutral gradient mark. -->
        <div class="brand-mark">💬</div>
        <div class="brand-text">
          <div class="brand-title" id="brand-title">Archive</div>
          <div class="brand-sub" id="brand-sub">group chat</div>
        </div>
      </div>
      <div class="conv-picker" id="conv-picker" hidden></div>
      <nav class="nav" id="nav" aria-label="Views">
        <div class="nav-section">
          <div class="nav-label">Explore</div>
          <button class="nav-item active" data-view="search"><span class="nav-ico">⌕</span> Search</button>
          <button class="nav-item" data-view="timeline"><span class="nav-ico">≡</span> Timeline</button>
          <button class="nav-item" data-view="gallery"><span class="nav-ico">🖼</span> Gallery</button>
          <button class="nav-item" data-view="pins"><span class="nav-ico">★</span> Pinned</button>
        </div>
        <div class="nav-section">
          <div class="nav-label">Highlights</div>
          <button class="nav-item" data-view="hof"><span class="nav-ico">🏆</span> Hall of Fame</button>
          <button class="nav-item" data-view="wrapped"><span class="nav-ico">🎁</span> Wrapped</button>
          <button class="nav-item" data-view="capsule"><span class="nav-ico">⏳</span> Capsule</button>
        </div>
        <div class="nav-section">
          <div class="nav-label">Analytics</div>
          <button class="nav-item" data-view="stats"><span class="nav-ico">▤</span> Stats</button>
          <button class="nav-item" data-view="threads"><span class="nav-ico">🧵</span> Threads</button>
          <button class="nav-item" data-view="chains"><span class="nav-ico">⛓</span> Chains</button>
        </div>
        <div class="nav-section">
          <div class="nav-label">Fun & Games</div>
          <button class="nav-item" data-view="battles"><span class="nav-ico">⚔</span> Battles</button>
          <button class="nav-item" id="nav-random"><span class="nav-ico">🎲</span> Random Quote</button>
        </div>
        <div class="nav-section">
          <div class="nav-label">Config</div>
          <button class="nav-item" data-view="people"><span class="nav-ico">◉</span> People</button>
          <button class="nav-item" data-view="settings"><span class="nav-ico">⚙</span> Settings</button>
        </div>
      </nav>
      <div class="sidebar-foot" id="sidebar-foot"></div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div id="view-search" class="view"></div>
      <div id="view-timeline" class="view" hidden></div>
      <div id="view-gallery" class="view" hidden></div>
      <div id="view-hof" class="view" hidden></div>
      <div id="view-pins" class="view" hidden></div>
      <div id="view-capsule" class="view" hidden></div>
      <div id="view-wrapped" class="view" hidden></div>
      <div id="view-threads" class="view" hidden></div>
      <div id="view-battles" class="view" hidden></div>
      <div id="view-chains" class="view" hidden></div>
      <div id="view-stats" class="view" hidden></div>
      <div id="view-people" class="view" hidden></div>
      <div id="view-settings" class="view" hidden></div>
    </main>
  </div>

  <!-- Mobile chrome (mock-timeline.html): top app bar, bottom tab bar and the
       "More" sheet. All display:none on desktop; the ≤760px media query in
       styles.css shows them and hides the sidebar. Wired by app.js. -->
  <div class="mobile-topbar">
    <span class="mmark" aria-hidden="true"></span>
    <div class="mpick" id="mpick">
      <span class="nm" id="mpick-nm">Archive</span>
      <span class="ct" id="mpick-ct"></span>
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      <select id="mobile-conv" aria-label="Switch group chat"></select>
    </div>
    <button class="mic" id="mic-jump" type="button" aria-label="Search / jump to date"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="4" y="5" width="16" height="16" rx="2"/><path d="M4 9h16M8 3v4M16 3v4"/></svg></button>
  </div>

  <nav class="tabbar" aria-label="Primary">
    <button class="tab" data-tab="search" type="button" aria-label="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>Search</button>
    <button class="tab" data-tab="timeline" type="button" aria-label="Timeline"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h11"/></svg>Timeline</button>
    <button class="tab" data-tab="gallery" type="button" aria-label="Gallery"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>Gallery</button>
    <button class="tab" data-tab="stats" type="button" aria-label="Stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg>Stats</button>
    <button class="tab" id="tab-more" type="button" aria-label="More views" aria-haspopup="dialog"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="5" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.6" fill="currentColor" stroke="none"/><circle cx="19" cy="12" r="1.6" fill="currentColor" stroke="none"/></svg>More</button>
  </nav>

  <div class="scrim" id="sheet-scrim"></div>
  <div class="sheet" id="more-sheet" role="dialog" aria-label="More views">
    <div class="grab" aria-hidden="true"></div>
    <div class="sh-title">More views</div>
    <div class="sh-grid">
      <button class="sh-item" data-tab="pins" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M7 4h10l-1 7 3 3H5l3-3z"/><path d="M12 14v6"/></svg>Pinned</button>
      <button class="sh-item" data-tab="hof" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="9" r="5.5"/><path d="M9 13.5L7.5 21l4.5-2.5L16.5 21 15 13.5"/></svg>Hall of Fame</button>
      <button class="sh-item" data-tab="wrapped" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3l2.1 4.3 4.7.7-3.4 3.3.8 4.7L12 18.7 7.8 16l.8-4.7L5.2 8l4.7-.7z"/></svg>Wrapped</button>
      <button class="sh-item" data-tab="capsule" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3.5 9a9 9 0 113 8.5M3.5 9V4.5M3.5 9H8M12 8v4.5l3 2"/></svg>Capsule</button>
      <button class="sh-item" data-tab="threads" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="6" cy="6" r="2.5"/><circle cx="6" cy="18" r="2.5"/><circle cx="17" cy="12" r="2.5"/><path d="M8.5 6H13a2 2 0 012 2v2M8.5 18H13a2 2 0 002-2v-2"/></svg>Threads</button>
      <button class="sh-item" data-tab="chains" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="6" r="2"/><circle cx="12" cy="18" r="2"/><circle cx="19" cy="12" r="2"/><path d="M6.7 11l3.6-3.4M13.7 7.4L17.3 11M17.3 13l-3.6 3.6M10.3 16.6L6.7 13"/></svg>Chains</button>
      <button class="sh-item" data-tab="battles" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 3v18M6 8l-2 2 2 2M18 8l2 2-2 2M4.5 10H9M15 10h4.5"/></svg>Battles</button>
      <button class="sh-item" id="sh-random" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h3.5l9 10H20M16.5 7H20M4 17h3.5l3-3.3"/><path d="M17.5 5.5L20 7l-2.5 1.5"/></svg>Random</button>
      <button class="sh-item" data-tab="people" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="8" cy="9" r="3"/><circle cx="17" cy="10" r="2.4"/><path d="M3 19c.6-3 2.6-4.5 5-4.5s4.4 1.5 5 4.5M15.5 18c.4-2 1.6-3 3-3s2.4 1 2.8 2.6"/></svg>People</button>
      <button class="sh-item" data-tab="settings" type="button"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 7h10M18 7h2M4 17h2M10 17h10"/><circle cx="16" cy="7" r="2.2"/><circle cx="8" cy="17" r="2.2"/></svg>Settings</button>
    </div>
  </div>

  <!-- Floating theme switch (Light / Dim / Lights out) — persisted to gca.theme.
       app.js wires the buttons + reflects the active theme with .on -->
  <div class="theme-switch" role="group" aria-label="Theme">
    <button data-set="light" title="Light" aria-label="Light"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.5M12 19.5V22M2 12h2.5M19.5 12H22M4.9 4.9l1.8 1.8M17.3 17.3l1.8 1.8M19.1 4.9l-1.8 1.8M6.7 17.3l-1.8 1.8"/></svg></button>
    <button data-set="dim" title="Dim" aria-label="Dim"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 000 18z" fill="currentColor" stroke="none"/></svg></button>
    <button data-set="lightsout" title="Lights out" aria-label="Lights out"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M20 14.5A8 8 0 019.5 4 7 7 0 1020 14.5z"/></svg></button>
  </div>

  <!-- Synthetic demo data ships with the repo. Real (gitignored) data loads
       afterward and overrides window.CHAT_DATA:
         · data.js                 — legacy root build (manual flow)
         · personal_data/data.js   — built by the setup wizard (preferred) -->
  <script src="data.sample.js"></script>
  <script src="data.js" onerror="void 0"></script>
  <script src="personal_data/data.js" onerror="void 0"></script>
  <!-- Optional, gitignored name/pfp/GC overrides:
         · names.local.js          — legacy root overrides
         · personal_data/local.js  — written by the setup wizard (LOCAL_NAMES /
           LOCAL_PFPS / LOCAL_ME / LOCAL_GC) -->
  <script src="names.local.js" onerror="void 0"></script>
  <script src="personal_data/local.js" onerror="void 0"></script>
  <script src="lib/fuse.min.js"></script>
  <script src="lib/chart.min.js"></script>
  <script src="src/keepalive.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
